target-version = "py313"
line-length = 100

[lint]
select = ["ALL"]
ignore = [
    # Framework-specific (not used)
    "AIR", "DJ", "FAST", "NPY", "PD",
    # Formatter conflicts (handled by ruff format)
    "W191", "E111", "E114", "E117", "D206", "D300",
    "Q", "COM812", "COM819", "ISC001",
    # Docstring style pair (use D211 + D213)
    "D203", "D212",
    # Not a project convention
    "CPY",
    # Overly restrictive for CLI scripts
    "TRY003", "PLR0913",
    # Standalone script, not a package
    "INP001",
]

[lint.isort]
force-single-line = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
